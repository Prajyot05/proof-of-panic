name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust Checks & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        
      - name: Check formatting
        run: cargo fmt --all -- --check
        
      - name: Clippy (Simulator)
        run: cargo clippy --manifest-path simulator/Cargo.toml -- -D warnings
        
      - name: Run Tests (Simulator)
        run: cargo test --manifest-path simulator/Cargo.toml

  anchor-build:
    name: Anchor Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Anchor
        uses: coral-xyz/setup-anchor@v3
        with:
          node-version: '20'
          
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        
      - name: Build Program
        run: anchor build

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Next.js App
        working-directory: ./app
        run: npm run build
      
      - name: Copy committed proofs into frontend public folder (if present)
        run: |
          node ./scripts/copy-proofs.js || true
      
      - name: Build SDK
        working-directory: ./packages/sdk
        run: |
          npm ci
          npm run build


  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [rust-checks, anchor-build, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Anchor
        uses: coral-xyz/setup-anchor@v3
        with:
          node-version: '20'
          
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        
      - name: Write keypair
        run: echo "${{ secrets.SOLANA_KEYPAIR_JSON }}" > deploy-keypair.json
        
      - name: Deploy Program
        run: |
          anchor build
          solana config set --url devnet --keypair deploy-keypair.json
          anchor deploy --provider.cluster devnet --provider.wallet deploy-keypair.json
          rm deploy-keypair.json

  e2e-verify:
    name: E2E: Verify Committed Proofs (conditional)
    runs-on: ubuntu-latest
    needs: [anchor-build, frontend]
    if: secrets.SP1_VERIFIER_PROGRAM_ID && secrets.DEPLOY_KEYPAIR_JSON
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Run verification script
        env:
          SP1_VERIFIER_PROGRAM_ID: ${{ secrets.SP1_VERIFIER_PROGRAM_ID }}
          HOME: ${{ runner.temp }}
          RPC_URL: https://api.devnet.solana.com
        run: |
          # Write a temporary keypair (must be funded on devnet by the repo owner)
          echo '${{ secrets.DEPLOY_KEYPAIR_JSON }}' > $HOME/deploy-keypair.json
          node ./scripts/6-verify.ts || (echo "E2E verify failed" && exit 1)
